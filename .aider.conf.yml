# Aider configuration
# Docs: https://aider.chat/docs/config/aider_conf.html

# Auto-load CONVENTIONS.md (which delegates to AGENTS.md + .ai/) as a read-only
# context file on every aider session.
read:
  - CONVENTIONS.md
  - AGENTS.md
  - .ai/project.md
